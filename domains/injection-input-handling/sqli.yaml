    - "**/*.cs"
    - "**/*.kt"
    - "**/*.scala"
    - "**/*.rs"
    - "**/mybatis/**/*.xml"
  relevance_signals:
    # SQL keywords in strings
    - "SELECT"
    - "INSERT"
    - "UPDATE"
    - "DELETE"
    - "CREATE TABLE"
    - "DROP TABLE"
    # Database driver/ORM imports
    - "cursor.execute"
    - "Statement"
    - "PreparedStatement"
    - "createQuery"
    - "createNativeQuery"
    - ".query("
    - ".execute("
    - "db.Query"
