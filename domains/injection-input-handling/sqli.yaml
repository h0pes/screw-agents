target_strategy:
  scope: "function"
  include_imports: true
  include_type_defs: true
  adaptive_depth:
    small: "Deep analysis — trace all data flows, check all ORM usage (<20 files)"
    medium: "Focus on data access layer, route handlers, DB driver imports (20-200 files)"
    large: "Surgical — prioritize files with SQL keywords, raw query methods, dangerous APIs (200+ files)"
  file_patterns:
    - "**/*.py"
    - "**/*.java"
    - "**/*.js"
    - "**/*.ts"
    - "**/*.go"
    - "**/*.rb"
